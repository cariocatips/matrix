<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARIOCA TIPS</title>

    <link rel="icon" href="MAT.PNG" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg,#000000,#1f1f1f);
            color: #ff0000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-top: 50px;
        }

        .description {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            color: #ff0000;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .vagas {
            margin-top: 15px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
            background: #ff0000;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .button {
            font-size: 1.3rem;
            background: #ff0000;
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .prints {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .prints img {
            width: 280px;
            border-radius: 10px;
            border: 2px solid #ff0000;
        }

        .prints-title {
            font-size: 1.8rem;
            color: #ff0000;
            margin-top: 40px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="title">
        Parabéns, você ganhou ACESSO GRÁTIS!
    </div>

    <div class="description">
        Clique no botão abaixo e receba seu BÔNUS!
    </div>

    <div class="vagas">
        ⚠️ RESTAM <span id="contador">05</span> VAGAS!
    </div>

    <button class="button" onclick="irTelegram()">
        ACESSAR BÔNUS AQUI!
    </button>

    <div class="prints-title">
        ODDS CRAVADAS
    </div>

    <div class="prints">
        <img src="BILHETE1.PNG" alt="Bilhete 1">
    </div>

    <button class="button" onclick="irTelegram()">
        ACESSO GRÁTIS
    </button>

    <script>

        let vagas = 05;

        setInterval(function() {
            if (vagas > 0) {
                vagas--;
                document.getElementById("contador").innerText = vagas;
            }
        }, 5000);

        function getCookie(name) {
            return document.cookie.split('; ').find(r => r.startsWith(name + '='))?.split('=')[1] || null;
        }

        function buildFbc() {
            const fbclid = new URLSearchParams(location.search).get('fbclid');
            return fbclid ? ('fb.1.' + Date.now() + '.' + fbclid) : null;
        }

        function sendCapi(path, body) {
            return fetch('https://meta-jmv3.onrender.com' + path, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                mode: 'cors',
                keepalive: true
            }).catch(() => {});
        }

        function sendPageViewOnce() {

            if (sessionStorage.getItem('pv_sent') === '1') return;

            const eventId = (crypto && crypto.randomUUID)
                ? crypto.randomUUID()
                : ('pv-' + Date.now() + '-' + Math.random().toString(36).slice(2));

            const fbp = getCookie('_fbp') || null;
            const fbc = buildFbc();

            const payload = {
                event_id: eventId,
                source_url: location.href,
                ...(fbp ? { fbp } : {}),
                ...(fbc ? { fbc } : {})
            };

            sendCapi('/capi/pageview', payload);
            sessionStorage.setItem('pv_sent', '1');
        }

        window.addEventListener('DOMContentLoaded', sendPageViewOnce);

        function enviarLeadCAPI(eventId) {

            const fbp = getCookie('_fbp') || null;
            const fbc = buildFbc();

            const payload = {
                event_id: eventId,
                source_url: location.href,
                ...(fbp ? { fbp } : {}),
                ...(fbc ? { fbc } : {})
            };

            sendCapi('/capi/lead', payload);
        }

        function irTelegram() {

            const eventId = (crypto && crypto.randomUUID)
                ? crypto.randomUUID()
                : ('lead-' + Date.now() + '-' + Math.random().toString(36).slice(2));

            enviarLeadCAPI(eventId);

            setTimeout(() => {
                window.location.href = "https://cariocatips.github.io/carioca/redir.html";
            }, 400);
        }

    </script>

</body>
</html>
